      - AIRTABLE_API_KEY
    check: '[[ -n "$AIRTABLE_API_KEY" ]]'
  firebase:
    env:
      - FIREBASE_SERVICE_ACCOUNT
    check: '[[ -n "$FIREBASE_SERVICE_ACCOUNT" ]]'
  apify:
    env:
      - APIFY_API_TOKEN
    check: '[[ -n "$APIFY_API_TOKEN" ]]'
  huggingface:
    env:
      - HF_TOKEN
    check: '[[ -n "$HF_TOKEN" ]]'
  codacy:
    env: []
    check: "true"
  fetch:
    env: []
    check: "true"
  git:
    env: []
    check: git rev-parse --git-dir >/dev/null 2>&1
  MCP_DOCKER:
    env: []
    check: docker info 2>/dev/null || true
  firecrawl:
    env:
      - FIRECRAWL_API_KEY
    check: '[[ -n "$FIRECRAWL_API_KEY" ]]'
    note: Firecrawl — Scrape, Search, Crawl, Agent (LLM-ready web data)
  attio:
    env:
      - ATTIO_API_KEY
    check: '[[ -n "$ATTIO_API_KEY" ]]'
    note: Attio — CRM
  atlassian:
    env:
      - ATLASSIAN_API_TOKEN
      - ATLASSIAN_USER_EMAIL
    check: '[[ -n "$ATLASSIAN_API_TOKEN" ]]'
