  openai:
    env:
      - OPENAI_API_KEY
    check: '[[ -n "$OPENAI_API_KEY" ]]'
    config: config/blackbox-agents.yaml
  gemini:
    env:
      - GOOGLE_API_KEY
      - GEMINI_API_KEY
    check: '[[ -n "${GOOGLE_API_KEY:-$GEMINI_API_KEY}" ]]'
    config: config/blackbox-agents.yaml
  vertex_ai:
    env:
      - GOOGLE_APPLICATION_CREDENTIALS
      - GOOGLE_CLOUD_PROJECT
    check:
      '[[ -n "$GOOGLE_APPLICATION_CREDENTIALS" ]] && [[ -f "${GOOGLE_APPLICATION_CREDENTIALS:-}"
      ]]'
    config: config/inference-models.yaml
  google:
    env:
      - GOOGLE_API_KEY
    check: '[[ -n "$GOOGLE_API_KEY" ]]'
    config: config/blackbox-agents.yaml
  blackbox:
    env:
      - BLACKBOX_API_KEY
    check: '[[ -n "$BLACKBOX_API_KEY" ]]'
    config: config/blackbox-agents.yaml
  xai:
