  figma:
    env: []
    check: "true"
    note: "Design — get_design_context, code_connect; use with Figma URLs"
  docker:
    env: []
    check: "true"
    note: MCP_DOCKER — gateway
clis:
  op:
    check: op --version 2>/dev/null
    note: 1Password CLI
  gh:
    check: gh --version 2>/dev/null
    note: GitHub CLI
  vercel:
    check: vercel --version 2>/dev/null
    note: Vercel CLI
  docker:
    check: docker --version 2>/dev/null
    note: Docker
  npx:
    check: npx --version 2>/dev/null
    note: Node package runner (MCP servers)
  python3:
    check: python3 --version 2>/dev/null
    note: Python 3
  jq:
    check: jq --version 2>/dev/null
    note: JSON processor
  curl:
    check: curl --version 2>/dev/null
    note: HTTP client
llms:
  anthropic:
    env:
      - ANTHROPIC_API_KEY
    check: '[[ -n "$ANTHROPIC_API_KEY" ]]'
